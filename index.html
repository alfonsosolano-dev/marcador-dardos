<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darts Master Fix</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .nav { margin-bottom: 15px; display: flex; gap: 5px; }
        .btn-nav { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; cursor: pointer; }
        .btn-nav.active { background: #f1c40f; color: black; font-weight: bold; }
        .scoreboard { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        .player-box { flex: 1; padding: 10px; border-radius: 12px; background: #1e272e; text-align: center; border: 4px solid transparent; }
        .active-p1 { border-color: var(--p1); }
        .active-p2 { border-color: var(--p2); }
        .score { font-size: 2.5rem; font-weight: bold; }
        .cricket-grid { width: 100%; max-width: 400px; margin-top: 10px; border-collapse: collapse; }
        .mark-btn { width: 60px; height: 50px; font-size: 1.5rem; background: #333; color: white; border: 1px solid #444; border-radius: 8px; cursor: pointer; touch-action: manipulation; }
        .mark-btn.done { color: #f1c40f; }
        .mark-btn.closed { background: #27ae60; color: white; }
        .num-cell { font-size: 1.4rem; font-weight: bold; width: 50px; text-align: center; }
        .btn-next { background: #f1c40f; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; max-width: 250px; margin-top: 15px; cursor: pointer; }
        .x01-controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 8px; border: none; background: #333; color: white; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="btn-nav" onclick="setModo(301)" id="n301">301</button>
        <button class="btn-nav active" onclick="setModo(501)" id="n501">501</button>
        <button class="btn-nav" onclick="setModo('C')" id="nC">CRICKET</button>
    </div>

    <div class="scoreboard">
        <div id="box0" class="player-box active-p1">
            <div id="s0" class="score">501</div>
            <div>P1</div>
        </div>
        <div id="box1" class="player-box">
            <div id="s1" class="score">501</div>
            <div>P2</div>
        </div>
    </div>

    </div>
