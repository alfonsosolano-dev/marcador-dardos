<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darts Master Ultimate</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --p3: #2ecc71; --p4: #f1c40f; --bg: #0f1418; --panel: #1e272e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Nav superior con 4 botones */
        .game-nav { display: flex; gap: 3px; background: #161a1d; padding: 8px; border-bottom: 1px solid #333; }
        .game-btn { flex: 1; padding: 10px 2px; border-radius: 6px; border: 1px solid #444; background: #2c3e50; color: white; font-weight: bold; font-size: 0.65rem; }
        .game-btn.active { background: #f1c40f; color: black; border-color: #f1c40f; }

        .view { display: none; flex: 1; overflow-y: auto; padding: 8px; padding-bottom: 80px; }
        .view.active { display: block; }

        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .p-box { background: var(--panel); padding: 8px; border-radius: 10px; border: 2px solid #333; }
        .active-0 { border-color: var(--p1); box-shadow: 0 0 8px var(--p1); }
        .active-1 { border-color: var(--p2); box-shadow: 0 0 8px var(--p2); }
        .active-2 { border-color: var(--p3); box-shadow: 0 0 8px var(--p3); }
        .active-3 { border-color: var(--p4); box-shadow: 0 0 8px var(--p4); }
        .score { font-size: 1.5rem; font-weight: bold; display: block; }
        .d-count { font-size: 0.7rem; color: #f1c40f; font-weight: bold; }

        .mult-bar { display: flex; gap: 5px; margin-bottom: 8px; }
        .m-sel { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #161a1d; color: white; font-weight: bold; }
        .m-sel.active { background: #e67e22; border-color: #f39c12; }

        .c-table { width: 100%; border-spacing: 2px; }
        .num-col { font-size: 1.1rem; font-weight: bold; color: #f1c40f; width: 32px; background: #2c3e50; border-radius: 4px; }
        .m-btn { width: 100%; height: 40px; font-size: 1.3rem; background: var(--panel); color: #333; border: 1px solid #222; border-radius: 4px; }
        .m-btn.is-target { border: 2px solid #fff; color: #fff; background: #34495e; }
        .m-btn.closed { background: #27ae60 !important; color: white !important; }
        .m-btn.locked { opacity: 0.15; pointer-events: none; }
        /* Estilo para botones activos en modo libre */
        .m-btn.free-active { color: #aaa; border: 1px solid #444; }

        #inpX { padding: 10px; font-size: 1.8rem; width: 90px; border-radius: 10px; border: none; background: #2c3e50; color: white; text-align: center; margin-bottom: 8px; }
        .btn-main { padding: 14px; border-radius: 10px; border: none; font-weight: bold; color: white; width: 100%; font-size: 0.9rem; margin-bottom: 6px; }
        
        .quick-tools { display: flex; gap: 4px; margin-top: 4px; }
        .btn-tool { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 0.65rem; font-weight: bold; color: white; }

        .tab-bar { display: flex; background: #161a1d; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; }
        .tab-btn.active { color: #f1c40f; border-top: 3px solid #f1c40f; }
        .hist-card { background: var(--panel); padding: 8px; border-radius: 8px; margin-bottom: 6px; text-align: left; border-left: 4px solid #f1c40f; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div id="view-game" class="view active">
        <div class="game-nav">
            <button class="game-btn" onclick="cambiarModo(301)" id="g301">301</button>
            <button class="game-btn" onclick="cambiarModo(501)" id="g501">501</button>
            <button class="game-btn active" onclick="cambiarModo('C')" id="gC">CRICKET</button>
            <button class="game-btn" onclick="cambiarModo('CL')" id="gCL">C. LIBRE</button>
        </div>

        <div class="header-grid">
            <div id="b0" class="p-box active-0"><span>P1</span><span class="score" id="s0">0</span><span class="d-count" id="d0">0/3</span></div>
            <div id="b1" class="p-box"><span>P2</span><span class="score" id="s1">0</span><span class="d-count" id="d1">0/3</span></div>
            <div id="b2" class="p-box"><span>P3</span><span class="score" id="s2">0</span><span class="d-count" id="d2">0/3</span></div>
            <div id="b3" class="p-box"><span>P4</span><span class="score" id="s3">0</span><span class="d-count" id="d3">0/3</span></div>
        </div>

        <div id="sec-x01" style="display:none;">
            <input type="number" id="inpX" placeholder="0" inputmode="numeric">
            <button class="btn-main" style="background:#27ae60;" onclick="anotarX()">ANOTAR DARDO</button>
        </div>

        <div id="sec-cricket">
            <div class="mult-bar">
                <button class="m-sel active" id="mx1" onclick="setMult(1)">x1</button>
                <button class="m-sel" id="mx2" onclick="setMult(2)">x2</button>
                <button class="m-sel" id="mx3" onclick="setMult(3)">x3</button>
            </div>
            <table class="c-table"><tbody id="c-body"></tbody></table>
            <button class="btn-main" style="background:#c0392b; margin-top:5px;" onclick="penalizar(25)">FALLO / DIANA (25)</button>
        </div>

        <button class="btn-main" style="background:#f1c40f; color:black;" onclick="pasarTurno()">SIGUIENTE JUGADOR ➜</button>

        <div class="quick-tools">
            <button class="btn-tool" style="background:#555;" onclick="deshacer()">↩ DESHACER</button>
            <button class="btn-tool" style="background:#e67e22;" onclick="penManual()">PENALIZAR</button>
            <button class="btn-tool" style="background:#c0392b;" onclick="resetConAviso()">🔄 RESET</button>
        </div>
    </div>

    <div id="view-hist" class="view">
        <h3>HISTORIAL</h3>
        <div id="hist-list"></div>
        <button class="btn-main" style="background:#c0392b; margin-top:20px;" onclick="borrarHist()">BORRAR TODO</button>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="t-game" onclick="switchTab('game')">DIANA</button>
        <button class="tab-btn" id="t-hist" onclick="switchTab('hist')">HISTORIAL</button>
    </div>

    <script>
        let modo = 'C', turno = 0, dardos = 0, mult = 1;
        let partidas = {
            301: { s: [301,301,301,301], m: null },
            501: { s: [501,501,501,501], m: null },
            'C': { s: [0,0,0,0], m: {20:[0,0,0,0],19:[0,0,0,0],18:[0,0,0,0],17:[0,0,0,0],16:[0,0,0,0],15:[0,0,0,0],25:[0,0,0,0]} },
            'CL': { s: [0,0,0,0], m: {20:[0,0,0,0],19:[0,0,0,0],18:[0,0,0,0],17:[0,0,0,0],16:[0,0,0,0],15:[0,0,0,0],25:[0,0,0,0]} }
        };
        let orden = [20,19,18,17,16,15,25], log = [];

        function switchTab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            document.getElementById('t-'+t).classList.add('active');
            if(t==='hist') renderHist();
        }

        function cambiarModo(m) {
            modo = m;
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('g'+m).classList.add('active');
            render();
        }

        function setMult(v) {
            mult = v;
            document.querySelectorAll('.m-sel').forEach(b => b.classList.remove('active'));
            document.getElementById('mx'+v).classList.add('active');
        }

        function getTargetGlobal() {
            if(modo === 'CL') return null; // En modo libre no hay target único
            for(let n of orden) {
                if(!partidas['C'].m[n].every(m => m >= 3)) return n;
            }
            return 25;
        }

        function save() { log.push(JSON.stringify({p:JSON.parse(JSON.stringify(partidas)), t:turno, d:dardos, m:modo})); }

        function deshacer() {
            if(log.length > 0) {
                let last = JSON.parse(log.pop());
                partidas = last.p; turno = last.t; dardos = last.d; modo = last.m;
                cambiarModo(modo);
            }
        }

        function anotarX() {
            let v = parseInt(document.getElementById('inpX').value);
            if(isNaN(v)) return;
            save();
            let cur = partidas[modo].s;
            if(cur[turno]-v < 0 || cur[turno]-v === 1) { alert("BUST!"); dardos=3; }
            else if(cur[turno]-v === 0) { victoria(turno); return; }
            else { cur[turno]-=v; dardos++; }
            document.getElementById('inpX').value = '';
            if(dardos>=3) pasarTurno(); else render();
        }

        function markC(n, p) {
            if(p !== turno) return;
            if(modo === 'C' && n !== getTargetGlobal()) return;
            
            save();
            let c = partidas[modo];
            for(let i=0; i<mult; i++) {
                if(c.m[n][p] < 3) c.m[n][p]++;
                else {
                    for(let j=0; j<4; j++) {
                        if(j!==p && c.m[n][j]<3) c.s[j] += (n===25?25:n);
                    }
                }
            }
            dardos++; setMult(1);
            if(dardos>=3) pasarTurno(); else { checkWinC(); render(); }
        }

        function penalizar(v) { save(); partidas[modo].s[turno]+=v; dardos++; if(dardos>=3) pasarTurno(); else render(); }
        function penManual() { let p = parseInt(prompt("Puntos:")); if(!isNaN(p)) penalizar(p); }
        function pasarTurno() { dardos=0; turno=(turno+1)%4; setMult(1); render(); }

        function victoria(p) {
            alert("¡VICTORIA J"+(p+1)+"!");
            let h = JSON.parse(localStorage.getItem('d_log') || '[]');
            h.unshift({f:new Date().toLocaleString(), m:modo==='CL'?'Cricket Libre':modo, g:p+1, s:[...partidas[modo].s]});
            localStorage.setItem('d_log', JSON.stringify(h.slice(0,10)));
            resetDirecto();
        }

        function renderHist() {
            let h = JSON.parse(localStorage.getItem('d_log') || '[]');
            let l = document.getElementById('hist-list');
            l.innerHTML = h.length ? "" : "Vacío";
            h.forEach(x => {
                l.innerHTML += `<div class="hist-card"><b>${x.f}</b><br>Modo: ${x.m} | Ganador: J${x.g}<br>Puntos: ${x.s.join(' | ')}</div>`;
            });
        }

        function borrarHist() { if(confirm("¿Borrar?")) { localStorage.removeItem('d_log'); renderHist(); } }
        function resetConAviso() { if(confirm("¿Reiniciar partida actual?")) resetDirecto(); }

        function resetDirecto() {
            if(modo === 'C' || modo === 'CL') {
                partidas[modo] = { s:[0,0,0,0], m:{20:[0,0,0,0],19:[0,0,0,0],18:[0,0,0,0],17:[0,0,0,0],16:[0,0,0,0],15:[0,0,0,0],25:[0,0,0,0]} };
            } else {
                partidas[modo].s = [modo, modo, modo, modo];
            }
            turno = 0; dardos = 0; log = []; render();
        }

        function render() {
            let cur = partidas[modo];
            document.getElementById('sec-x01').style.display = (modo==='301' || modo==='501' ? 'block' : 'none');
            document.getElementById('sec-cricket').style.display = (modo==='C' || modo==='CL' ? 'block' : 'none');
            
            for(let i=0; i<4; i++) {
                document.getElementById('s'+i).innerText = cur.s[i];
                document.getElementById('b'+i).className = 'p-box' + (turno===i?' active-'+i:'');
                document.getElementById('d'+i).innerText = (turno===i ? "DARDOS: "+dardos+"/3" : "");
            }

            if(modo==='C' || modo==='CL') {
                let h = "";
                let targetGlobal = getTargetGlobal();
                orden.forEach(n => {
                    h += `<tr>`;
                    for(let p=0; p<4; p++) {
                        if(p===2) h += `<td class="num-col">${n==25?'B':n}</td>`;
                        let marcas = cur.m[n][p];
                        let isClosed = marcas >= 3;
                        let btnClass = "";
                        
                        if(modo === 'C') {
                            btnClass = isClosed ? 'closed' : (n !== targetGlobal ? 'locked' : (p === turno ? 'is-target' : ''));
                        } else {
                            // Modo Libre
                            btnClass = isClosed ? 'closed' : (p === turno ? 'free-active' : '');
                        }
                        h += `<td><button class="m-btn ${btnClass}" onclick="markC(${n},${p})">${getSim(marcas)}</button></td>`;
                    }
                    h += `</tr>`;
                });
                document.getElementById('c-body').innerHTML = h;
            }
        }
        function getSim(c) { return c===0?"":(c===1?"/":(c===2?"X":"⊚")); }
        function checkWinC() {
            let c = partidas[modo];
            for(let p=0; p<4; p++) { 
                if(orden.every(n => c.m[n][p]>=3) && c.s[p] === Math.min(...c.s)) victoria(p); 
            }
        }
        render();
    </script>
</body>
</html>
