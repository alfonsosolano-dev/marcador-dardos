<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="http://googleusercontent.com/image_collection/image_retrieval/11757662392344264223_0">
    <title>Darts Pro 4P</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --p3: #2ecc71; --p4: #f1c40f; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 5px; overflow-x: hidden; }
        
        .nav { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .nav-btn { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.8rem; }
        .nav-btn.active { background: #f1c40f; color: black; border-color: #f1c40f; }

        /* Cuadrícula 4 Jugadores */
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .p-box { background: #1e272e; padding: 10px; border-radius: 10px; border: 3px solid transparent; transition: 0.2s; }
        .p-box.active-0 { border-color: var(--p1); box-shadow: 0 0 10px var(--p1); }
        .p-box.active-1 { border-color: var(--p2); box-shadow: 0 0 10px var(--p2); }
        .p-box.active-2 { border-color: var(--p3); box-shadow: 0 0 10px var(--p3); }
        .p-box.active-3 { border-color: var(--p4); box-shadow: 0 0 10px var(--p4); }
        
        .score { font-size: 1.8rem; font-weight: bold; margin: 2px 0; }
        .p-name { color: #ccc; font-size: 0.8rem; border-bottom: 1px dashed #555; white-space: nowrap; overflow: hidden; }

        /* Controles */
        input[type="number"] { padding: 12px; font-size: 1.5rem; width: 100px; text-align: center; border-radius: 8px; border: none; background: #333; color: white; margin-bottom: 10px; }
        .btn-main { padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; width: 90%; }

        /* Cricket 4P */
        .grid { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .m-btn { width: 45px; height: 45px; font-size: 1.4rem; background: #2c3e50; color: white; border: 1px solid #121212; border-radius: 5px; }
        .m-btn.closed { background: #27ae60; }
        .num-col { font-size: 1.2rem; font-weight: bold; color: #f1c40f; width: 30px; }

        .history { margin: 15px auto; background: #1e272e; padding: 10px; border-radius: 10px; text-align: left; font-size: 0.8rem; }
        .footer { margin-top: 10px; padding-bottom: 30px; display: flex; justify-content: center; gap: 10px; }
        .btn-sec { background: #444; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="nav-btn" onclick="cambiarJuego(301)" id="btn301">301</button>
        <button class="nav-btn active" onclick="cambiarJuego(501)" id="btn501">501</button>
        <button class="nav-btn" onclick="cambiarJuego('C')" id="btnC">CRICKET</button>
    </div>

    <div class="header-grid">
        <div id="b0" class="p-box active-0" onclick="turno=0; render()">
            <div id="n0" class="p-name" onclick="editarNombre(0)">P1</div>
            <div class="score" id="s0">501</div>
        </div>
        <div id="b1" class="p-box" onclick="turno=1; render()">
            <div id="n1" class="p-name" onclick="editarNombre(1)">P2</div>
            <div class="score" id="s1">501</div>
        </div>
        <div id="b2" class="p-box" onclick="turno=2; render()">
            <div id="n2" class="p-name" onclick="editarNombre(2)">P3</div>
            <div class="score" id="s2">501</div>
        </div>
        <div id="b3" class="p-box" onclick="turno=3; render()">
            <div id="n3" class="p-name" onclick="editarNombre(3)">P4</div>
            <div class="score" id="s3">501</div>
        </div>
    </div>

    <div id="seccion-x01">
        <input type="number" id="inputX01" placeholder="0" inputmode="numeric">
        <button class="btn-main" onclick="anotarX01()">ANOTAR</button>
    </div>

    <div id="seccion-cricket" style="display:none;">
        <table class="grid"><tbody id="c-body"></tbody></table>
        <button class="btn-main" style="background:#f1c40f; color:black; margin-top:10px;" onclick="siguienteTurno()">SIGUIENTE TURNO ➜</button>
    </div>

    <div class="history">
        <div style="display:flex; justify-content:space-between;">
            <b style="color:#f1c40f">HISTORIAL</b>
            <span onclick="localStorage.removeItem('darts_4p'); mostrarHist();" style="cursor:pointer">🗑️</span>
        </div>
        <div id="hist-list"></div>
    </div>

    <div class="footer">
        <button class="btn-sec" onclick="undo()">↩ Deshacer</button>
        <button class="btn-sec" style="background:#c0392b;" onclick="reiniciarPartida()">Reiniciar</button>
    </div>

    <script>
        let modo = 501;
        let turno = 0;
        let scores = [501, 501, 501, 501];
        let nombres = ["P1", "P2", "P3", "P4"];
        let marks = {20:[0,0,0,0], 19:[0,0,0,0], 18:[0,0,0,0], 17:[0,0,0,0], 16:[0,0,0,0], 15:[0,0,0,0], 25:[0,0,0,0]};
        let history = [];

        function editarNombre(p) {
            let n = prompt("Nombre Jugador " + (p+1), nombres[p]);
            if(n) { nombres[p] = n.substring(0, 8); render(); }
        }

        function cambiarJuego(m) {
            modo = m;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + (m==='C'?'C':m)).classList.add('active');
            reiniciarPartida();
        }

        function anotarX01() {
            let inp = document.getElementById('inputX01');
            let val = parseInt(inp.value);
            if(isNaN(val)) return;
            save();
            let res = scores[turno] - val;
            if(res < 0 || res === 1) alert("BUST!");
            else if(res === 0) { alert("¡GANADOR " + nombres[turno] + "!"); registrarFin(nombres[turno], modo); reiniciarPartida(); }
            else scores[turno] = res;
            siguienteTurno();
            inp.value = '';
            render();
        }

        function markC(num, p) {
            turno = p; // Cambia el turno al pulsar el botón
            save();
            marks[num][p]++;
            if(marks[num][p] > 3) {
                // Solo puntúa si alguien más NO lo ha cerrado
                let alguienAbierto = false;
                for(let i=0; i<4; i++) { if(i!==p && marks[num][i] < 3) alguienAbierto = true; }
                if(alguienAbierto) scores[p] += (num === 25 ? 25 : num);
            }
            // Victoria Cricket simplificada
            const targets = [20,19,18,17,16,15,25];
            if(targets.every(t => marks[t][p] >= 3)) {
                let maxPuntos = true;
                for(let i=0; i<4; i++) { if(scores[i] > scores[p]) maxPuntos = false; }
                if(maxPuntos) { alert("GANADOR " + nombres[p]); registrarFin(nombres[p], "Cricket"); reiniciarPartida(); }
            }
            render();
        }

        function siguienteTurno() { turno = (turno + 1) % 4; render(); }

        function reiniciarPartida() {
            scores = (modo === 'C') ? [0,0,0,0] : [modo, modo, modo, modo];
            marks = {20:[0,0,0,0], 19:[0,0,0,0], 18:[0,0,0,0], 17:[0,0,0,0], 16:[0,0,0,0], 15:[0,0,0,0], 25:[0,0,0,0]};
            turno = 0; history = []; render();
        }

        function render() {
            for(let i=0; i<4; i++) {
                document.getElementById('s'+i).innerText = scores[i];
                document.getElementById('n'+i).innerText = nombres[i];
                document.getElementById('b'+i).className = 'p-box' + (turno===i ? ' active-'+i : '');
            }

            if(modo === 'C') {
                document.getElementById('seccion-x01').style.display = 'none';
                document.getElementById('seccion-cricket').style.display = 'block';
                let h = "";
                [20,19,18,17,16,15,25].forEach(n => {
                    h += `<tr>`;
                    for(let p=0; p<4; p++) {
                        if(p===2) h += `<td class="num-col">${n==25?'B':n}</td>`;
                        h += `<td><button class="m-btn ${marks[n][p]>=3?'closed':''}" onclick="markC(${n},${p})">${getS(marks[n][p])}</button></td>`;
                    }
                    h += `</tr>`;
                });
                document.getElementById('c-body').innerHTML = h;
            } else {
                document.getElementById('seccion-x01').style.display = 'block';
                document.getElementById('seccion-cricket').style.display = 'none';
            }
        }

        function getS(c) { if(c===0) return ""; if(c===1) return "/"; if(c===2) return "X"; return "⊚"; }
        function save() { history.push({s:[...scores], t:turno, m:JSON.parse(JSON.stringify(marks))}); }
        function undo() { if(history.length>0) { let l=history.pop(); scores=l.s; turno=l.t; marks=l.m; render(); } }
        
        function registrarFin(w, t) {
            let logs = JSON.parse(localStorage.getItem('darts_4p')) || [];
            logs.unshift({ w, t, d: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
            localStorage.setItem('darts_4p', JSON.stringify(logs.slice(0,5)));
            mostrarHist();
        }

        function mostrarHist() {
            let logs = JSON.parse(localStorage.getItem('darts_4p')) || [];
            document.getElementById('hist-list').innerHTML = logs.map(l => `<div>🏆 ${l.w} (${l.t}) - ${l.d}</div>`).join('') || "No hay partidas";
        }

        mostrarHist();
        render();
    </script>
</body>
</html>
