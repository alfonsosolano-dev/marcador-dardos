<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darts Master Final</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: #333; color: white; border: 2px solid #555; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; max-width: 100px; font-weight: bold; }
        .nav-btn.active { background: #f1c40f; color: black; border-color: #f1c40f; }
        .header { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .p-box { background: #1e272e; padding: 15px; border-radius: 12px; width: 40%; border: 4px solid transparent; }
        .p-box.active-0 { border-color: var(--p1); box-shadow: 0 0 15px var(--p1); }
        .p-box.active-1 { border-color: var(--p2); box-shadow: 0 0 15px var(--p2); }
        .score { font-size: 2.5rem; font-weight: bold; margin: 5px 0; }
        input { padding: 15px; font-size: 1.8rem; width: 140px; text-align: center; border-radius: 10px; border: none; background: #333; color: white; margin-bottom: 10px; }
        .btn-main { padding: 15px 30px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; width: 80%; max-width: 250px; }
        .grid { width: 100%; max-width: 400px; margin: 10px auto; border-collapse: collapse; }
        .m-btn { width: 70px; height: 60px; font-size: 1.8rem; background: #333; color: white; border: 1px solid #444; border-radius: 10px; }
        .m-btn.closed { background: #27ae60; color: white; }
        .num { font-size: 1.5rem; font-weight: bold; color: #f1c40f; }
        .history { margin-top: 20px; background: #1e272e; padding: 15px; border-radius: 10px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
        .hist-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="nav-btn" onclick="cambiarJuego(301)" id="btn301">301</button>
        <button class="nav-btn active" onclick="cambiarJuego(501)" id="btn501">501</button>
        <button class="nav-btn" onclick="cambiarJuego('C')" id="btnC">CRICKET</button>
    </div>

    <div class="header">
        <div id="b0" class="p-box active-0">
            <div class="score" id="s0">501</div>
            <div id="w0" style="color:#f1c40f; font-size:0.8rem">0 Wins</div>
        </div>
        <div id="b1" class="p-box">
            <div class="score" id="s1">501</div>
            <div id="w1" style="color:#f1c40f; font-size:0.8rem">0 Wins</div>
        </div>
    </div>

    <div id="seccion-x01">
        <input type="number" id="inputX01" placeholder="Score" inputmode="numeric">
        <br>
        <button class="btn-main" onclick="anotarX01()">ANOTAR</button>
    </div>

    <div id="seccion-cricket" style="display:none;">
        <table class="grid"><tbody id="c-body"></tbody></table>
        <button class="btn-main" style="background:#f1c40f; color:black; margin-top:10px;" onclick="turno = 1 - turno; render();">CAMBIAR TURNO ➜</button>
    </div>

    <div class="history">
        <div style="font-weight:bold; border-bottom:1px solid #444; margin-bottom:10px;">HISTORIAL</div>
        <div id="hist-list"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#e74c3c; font-size:0.7rem; margin-top:10px; cursor:pointer;">Borrar todo</button>
    </div>

    <div style="margin-top:20px;">
        <button onclick="undo()" style="background:#555; color:white; border:none; padding:10px; border-radius:5px; margin-right:10px;">↩ Deshacer</button>
        <button onclick="reiniciarPartida()" style="background:none; border:1px solid #555; color:#777; padding:10px; border-radius:5px;">Reset Leg</button>
    </div>

    <script>
        let modo = 501;
        let turno = 0;
        let scores = [501, 501];
        let wins = [0, 0];
        let history = [];
        let marks = {20:[0,0], 19:[0,0], 18:[0,0], 17:[0,0], 16:[0,0], 15:[0,0], 25:[0,0]};

        function cambiarJuego(m) {
            modo = m;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(m === 301) document.getElementById('btn301').classList.add('active');
            if(m === 501) document.getElementById('btn501').classList.add('active');
            if(m === 'C') document.getElementById('btnC').classList.add('active');
            reiniciarPartida();
        }

        function anotarX01() {
            let val = parseInt(document.getElementById('inputX01').value);
            if(isNaN(val)) return;
            save();
            let res = scores[turno] - val;
            if(res < 0 || res === 1) alert("BUST!");
            else if(res === 0) { wins[turno]++; registrarFin(`P${turno+1}`, modo); reiniciarPartida(); }
            else scores[turno] = res;
            turno = 1 - turno;
            document.getElementById('inputX01').value = '';
            render();
        }

        function markC(n, p) {
            if(p !== turno) { if(!confirm("¿Turno de P"+(p+1)+"?")) return; turno = p; }
            save();
            marks[n][p]++;
            if(marks[n][p] > 3 && marks[n][1-p] < 3) scores[p] += (n === 25 ? 25 : n);
            
            const nums = [20,19,18,17,16,15,25];
            if(nums.every(num => marks[num][p] >= 3) && scores[p] >= scores[1-p]) {
                wins[p]++; registrarFin(`P${p+1}`, "Cricket"); reiniciarPartida();
            }
            render();
        }

        function render() {
            document.getElementById('s0').innerText = scores[0];
            document.getElementById('s1').innerText = scores[1];
            document.getElementById('w0').innerText = wins[0] + " Wins";
            document.getElementById('w1').innerText = wins[1] + " Wins";
            document.getElementById('b0').className = 'p-box' + (turno===0 ? ' active-0' : '');
            document.getElementById('b1').className = 'p-box' + (turno===1 ? ' active-1' : '');

            if(modo === 'C') {
                document.getElementById('seccion-x01').style.display = 'none';
                document.getElementById('seccion-cricket').style.display = 'block';
                let h = "";
                [20,19,18,17,16,15,25].forEach(n => {
                    h += `<tr>
                        <td><button class="m-btn ${marks[n][0]>=3?'closed':''}" onclick="markC(${n},0)">${getS(marks[n][0])}</button></td>
                        <td class="num">${n==25?'B':n}</td>
                        <td><button class="m-btn ${marks[n][1]>=3?'closed':''}" onclick="markC(${n},1)">${getS(marks[n][1])}</button></td>
                    </tr>`;
                });
                document.getElementById('c-body').innerHTML = h;
            } else {
                document.getElementById('seccion-x01').style.display = 'block';
                document.getElementById('seccion-cricket').style.display = 'none';
            }
        }

        function getS(c) { if(c===0) return ""; if(c===1) return "/"; if(c===2) return "X"; return "⊚"; }
        function save() { history.push({s:[...scores], t:turno, m:JSON.parse(JSON.stringify(marks))}); }
        function undo() { if(history.length>0) { let l=history.pop(); scores=l.s; turno=l.t; marks=l.m; render(); } }
        
        function reiniciarPartida() {
            scores = (modo==='C') ? [0,0] : [modo, modo];
            marks = {20:[0,0], 19:[0,0], 18:[0,0], 17:[0,0], 16:[0,0], 15:[0,0], 25:[0,0]};
            turno = 0; history = []; render();
        }

        function registrarFin(w, t) {
            let logs = JSON.parse(localStorage.getItem('darts_v2')) || [];
            logs.unshift({ w, t, d: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
            localStorage.setItem('darts_v2', JSON.stringify(logs.slice(0,5)));
            mostrarHist();
        }

        function mostrarHist() {
            let logs = JSON.parse(localStorage.getItem('darts_v2')) || [];
            document.getElementById('hist-list').innerHTML = logs.map(l => `
                <div class="hist-item"><span>🏆 ${l.w} (${l.t})</span><span>${l.d}</span></div>
            `).join('') || "No hay partidas";
        }

        mostrarHist();
        render();
    </script>
</body>
</html>
