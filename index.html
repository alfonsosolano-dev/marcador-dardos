<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darts Master Pro + Historial</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        
        .nav { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .nav-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .nav-btn.active { background: #f1c40f; color: black; font-weight: bold; }

        .header { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .p-box { background: #1e272e; padding: 10px; border-radius: 10px; width: 42%; border: 3px solid transparent; }
        .p-box.active { border-color: var(--p1); box-shadow: 0 0 10px var(--p1); }
        .p-box.active-p2 { border-color: var(--p2); box-shadow: 0 0 10px var(--p2); }
        .score { font-size: 2.2rem; font-weight: bold; margin: 5px 0; }

        /* X01 */
        .x01-input { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        input { padding: 15px; font-size: 1.5rem; width: 120px; text-align: center; border-radius: 8px; border: none; background: #333; color: white; }
        .btn-add { padding: 15px 30px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; }

        /* Cricket */
        .grid { width: 100%; max-width: 420px; margin: 10px auto; border-collapse: collapse; }
        .m-btn { width: 65px; height: 55px; font-size: 1.6rem; background: #333; color: white; border: 1px solid #444; border-radius: 8px; cursor: pointer; }
        .m-btn.closed { background: #27ae60; color: white; }
        .num { font-size: 1.3rem; font-weight: bold; color: #f1c40f; width: 50px; }

        .btn-next { padding: 15px; width: 90%; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        /* Historial */
        .history-card { margin-top: 30px; background: #1e272e; padding: 15px; border-radius: 10px; max-width: 400px; margin-left: auto; margin-right: auto; text-align: left; }
        .history-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 8px 0; font-size: 0.9rem; }
        .hist-winner { color: #f1c40f; font-weight: bold; }

        .footer { margin-top: 20px; display: flex; justify-content: center; gap: 20px; padding-bottom: 30px; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="nav-btn" onclick="setModo(301)" id="n301">301</button>
        <button class="nav-btn active" onclick="setModo(501)" id="n501">501</button>
        <button class="nav-btn" onclick="setModo('C')" id="nC">CRICKET</button>
    </div>

    <div class="header">
        <div id="b0" class="p-box active">
            <div class="score" id="s0">501</div>
            <div>P1</div>
        </div>
        <div id="b1" class="p-box">
            <div class="score" id="s1">501</div>
            <div>P2</div>
        </div>
    </div>

    <div id="area-x01">
        <div class="x01-input">
            <input type="number" id="inp" placeholder="0" inputmode="numeric">
            <button class="btn-add" onclick="addX01()">ANOTAR PUNTOS</button>
        </div>
    </div>

    <table id="area-c" class="grid" style="display:none;">
        <tbody id="c-body"></tbody>
    </table>

    <button id="next-btn" class="btn-next" style="display:none;" onclick="turno = 1 - turno; update();">SIGUIENTE JUGADOR ➜</button>

    <div class="history-card">
        <div style="font-weight:bold; border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 10px;">HISTORIAL RECIENTE</div>
        <div id="log-partidas"></div>
    </div>

    <div class="footer">
        <button onclick="undo()" style="background:none; border:1px solid #555; color:#aaa; padding:8px; border-radius:5px;">↩ Deshacer</button>
        <button onclick="clearHistory()" style="background:none; border:1px solid #e74c3c; color:#e74c3c; padding:8px; border-radius:5px;">Borrar Historial</button>
        <button onclick="reset()" style="background:none; border:1px solid #555; color:#aaa; padding:8px; border-radius:5px;">Reiniciar Partida</button>
    </div>

    <script>
        let modo = 501;
        let turno = 0;
        let scores = [501, 501];
        let history = [];
        let marks = {20:[0,0], 19:[0,0], 18:[0,0], 17:[0,0], 16:[0,0], 15:[0,0], 25:[0,0]};

        window.onload = function() {
            mostrarLog();
        };

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n'+m).classList.add('active');
            reset();
        }

        function addX01() {
            let v = parseInt(document.getElementById('inp').value);
            if(isNaN(v)) return;
            save();
            let res = scores[turno] - v;
            if(res < 0 || res === 1) alert("¡BUST!");
            else if(res === 0) { finalizar(`Jugador ${turno + 1}`, modo); }
            else scores[turno] = res;
            turno = 1 - turno;
            document.getElementById('inp').value = '';
            update();
        }
