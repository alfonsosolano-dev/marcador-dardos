<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darts Tab Pro</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --p3: #2ecc71; --p4: #f1c40f; --bg: #0f1418; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Contenedor de Pestañas */
        .tab-content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* Navegación Inferior */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e272e; display: flex; border-top: 2px solid #333; height: 65px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 0.7rem; font-weight: bold; border: none; background: none; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }

        /* Header y Modos */
        .game-header { display: flex; gap: 5px; margin-bottom: 10px; }
        .mode-btn { flex: 1; background: #2c3e50; border: none; color: white; padding: 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .mode-btn.active { background: var(--accent); color: black; }

        /* Marcadores */
        .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .p-box { background: #1e272e; padding: 8px; border-radius: 10px; border: 2px solid #333; }
        .active-0 { border-color: var(--p1); box-shadow: 0 0 10px var(--p1); }
        .active-1 { border-color: var(--p2); box-shadow: 0 0 10px var(--p2); }
        .active-2 { border-color: var(--p3); box-shadow: 0 0 10px var(--p3); }
        .active-3 { border-color: var(--p4); box-shadow: 0 0 10px var(--p4); }
        .score { font-size: 1.8rem; font-weight: bold; display: block; }

        /* Cricket UI */
        .mult-bar { display: flex; gap: 5px; margin: 10px 0; }
        .m-sel { flex: 1; background: #333; border: 1px solid #555; color: white; padding: 12px; border-radius: 6px; font-weight: bold; }
        .m-sel.active { background: #e67e22; border: none; }
        .grid { width: 100%; border-spacing: 2px; }
        .m-btn { width: 100%; height: 50px; font-size: 1.5rem; background: #1e272e; color: #444; border: 1px solid #333; border-radius: 5px; }
        .m-btn.is-target { border: 1.5px solid white; color: #fff; }
        .m-btn.closed { background: #27ae60 !important; color: white !important; }
        .num-col { color: var(--accent); font-weight: bold; width: 35px; font-size: 1.2rem; }

        /* X01 UI */
        #inpX { width: 100%; box-sizing: border-box; padding: 20px; font-size: 2.5rem; background: #2c3e50; border: none; color: white; border-radius: 10px; text-align: center; margin-bottom: 15px; }

        /* Botones Acción */
        .btn-big { width: 100%; padding: 20px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-sub { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; flex: 1; }

        /* Historial */
        .hist-item { background: #1e272e; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); text-align: left; }
    </style>
</head>
<body>

    <div class="tab-content">
        <div id="tab-juego" class="tab-pane active">
            <div class="game-header">
                <button class="mode-btn" onclick="setModo(301)" id="m301">301</button>
                <button class="mode-btn active" onclick="setModo(501)" id="m501">501</button>
                <button class="mode-btn" onclick="setModo('C')" id="mC">CRICKET</button>
            </div>

            <div class="players-grid">
                <div id="b0" class="p-box active-0"><span id="s0" class="score">0</span><div id="d0" style="font-size:0.6rem"></div></div>
                <div id="b1" class="p-box"><span id="s1" class="score">0</span><div id="d1" style="font-size:0.6rem"></div></div>
                <div id="b2" class="p-box"><span id="s2" class="score">0</span><div id="d2" style="font-size:0.6rem"></div></div>
                <div id="b3" class="p-box"><span id="s3" class="score">0</span><div id="d3" style="font-size:0.6rem"></div></div>
            </div>

            <div id="ui-x01">
                <input type="number" id="inpX" placeholder="Puntos" inputmode="numeric">
                <button class="btn-big" style="background:#27ae60; color:white;" onclick="addX()">ANOTAR DARDO</button>
            </div>

            <div id="ui-cricket" style="display:none;">
                <div class="mult-bar">
                    <button class="m-sel active" id="mx1" onclick="setM(1)">X1</button>
                    <button class="m-sel" id="mx2" onclick="setM(2)">X2</button>
                    <button class="m-sel" id="mx3" onclick="setM(3)">X3</button>
                </div>
                <table class="grid"><tbody id="c-body"></tbody></table>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn-sub" style="background:#c0392b" onclick="penal(25)">FUERA</button>
                    <button class="btn-sub" style="background:#444" onclick="penalM()">OTRO Nº</button>
                </div>
            </div>

            <button class="btn-big" style="background:var(--accent); color:black; margin-top:15px; font-size:1rem; padding:15px;" onclick="next()">SIGUIENTE JUGADOR ➜</button>
            <button onclick="undo()" style="width:100%; background:none; color:#888; border:none; margin-top:10px; text-decoration:underline;">Deshacer último dardo</button>
        </div>

        <div id="tab-hist" class="tab-pane">
            <h2 style="color:var(--accent)">Historial de Partidas</h2>
            <div id="hist-lista"></div>
            <button class="btn-big" style="background:#c0392b; color:white; margin-top:20px;" onclick="clearHist()">BORRAR HISTORIAL</button>
        </div>

        <div id="tab-config" class="tab-pane">
            <h2 style="color:var(--accent)">Ajustes</h2>
            <p>Reinicia la partida actual o configura opciones.</p>
            <button class="btn-big" style="background:#e74c3c; color:white;" onclick="resetGame()">REINICIAR PARTIDA ACTUAL</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('juego', this)">
            <span class="nav-icon">🎯</span><span>JUEGO</span>
        </button>
        <button class="nav-item" onclick="switchTab('hist', this)">
            <span class="nav-icon">📜</span><span>HISTORIAL</span>
        </button>
        <button class="nav-item" onclick="switchTab('config', this)">
            <span class="nav-icon">⚙️</span><span>AJUSTES</span>
        </button>
    </nav>

    <script>
        let modo = 501, turno = 0, scores = [501,501,501,501], dardos = 0, mult = 1;
        let marks = {20:[0,0,0,0],19:[0,0,0,0],18:[0,0,0,0],17:[0,0,0,0],16:[0,0,0,0],15:[0,0,0,0],25:[0,0,0,0]};
        let orden = [20,19,18,17,16,15,25], log = [];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'hist') renderHist();
        }

        function setModo(m) { 
            modo = m; 
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('m'+(m==='C'?'C':m)).classList.add('active');
            resetGame(true); 
        }

        function setM(v) { 
            mult = v; 
            document.querySelectorAll('.m-sel').forEach(b => b.classList.remove('active'));
            document.getElementById('mx'+v).classList.add('active');
        }

        function getT() { for(let n of orden) { if(marks[n].some(m => m < 3)) return n; } return 25; }

        function save() { log.push(JSON.stringify({s:[...scores], t:turno, m:JSON.parse(JSON.stringify(marks)), d:dardos})); }
        
        function undo() { if(log.length>0) { let l=JSON.parse(log.pop()); scores=l.s; turno=l.t; marks=l.m; dardos=l.d; render(); } }

        function addX() {
            let v = parseInt(document.getElementById('inpX').value);
            if(isNaN(v)) return;
            save();
            if(scores[turno]-v < 0 || scores[turno]-v === 1) { alert("BUST!"); dardos=3; }
            else if(scores[turno]-v === 0) { win(turno); return; }
            else { scores[turno]-=v; dardos++; }
            document.getElementById('inpX').value = '';
            if(dardos>=3) next(); else render();
        }

        function markC(n, p) {
            if(p !== turno || n !== getT()) return;
            save();
            for(let i=0; i<mult; i++) {
                if(marks[n][p] < 3) marks[n][p]++;
                else { for(let j=0; j<4; j++) { if(j!==p && marks[n][j]<3) scores[j]+=(n===25?25:n); } }
            }
            dardos++; setM(1);
            if(dardos>=3) next(); else { checkC(); render(); }
        }

        function penal(v) { save(); scores[turno]+=v; dardos++; if(dardos>=3) next(); else render(); }
        function penalM() { let p = parseInt(prompt("Puntos:")); if(!isNaN(p)) penal(p); }
        function next() { dardos=0; turno=(turno+1)%4; setM(1); render(); }

        function win(p) {
            alert("¡GANADOR J"+(p+1)+"!");
            let h = JSON.parse(localStorage.getItem('darts_v2') || '[]');
            h.unshift({f:new Date().toLocaleString(), m:modo==='C'?'Cricket':modo, w:p+1, s:[...scores]});
            localStorage.setItem('darts_v2', JSON.stringify(h.slice(0,10)));
            resetGame(true);
        }

        function render
