<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darts Master Pro 4P</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --p3: #2ecc71; --p4: #f1c40f; --bg: #0f1418; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 5px; overflow: hidden; }
        
        /* Nav */
        .nav { display: flex; gap: 4px; margin-bottom: 10px; }
        .nav-btn { background: #2c3e50; color: #95a5a6; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; font-size: 0.7rem; }
        .nav-btn.active { background: #f1c40f; color: black; }

        /* Marcadores */
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .p-box { background: #1e272e; padding: 8px; border-radius: 10px; border: 2px solid #333; position: relative; }
        .active-0 { border-color: var(--p1); box-shadow: 0 0 10px var(--p1); }
        .active-1 { border-color: var(--p2); box-shadow: 0 0 10px var(--p2); }
        .active-2 { border-color: var(--p3); box-shadow: 0 0 10px var(--p3); }
        .active-3 { border-color: var(--p4); box-shadow: 0 0 10px var(--p4); }
        .score { font-size: 1.6rem; font-weight: bold; display: block; }
        .d-count { font-size: 0.7rem; color: #aaa; }

        /* Multiplicador */
        .mult-bar { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .m-sel { background: #333; border: 2px solid #555; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; flex: 1; }
        .m-sel.active { background: #e67e22; border-color: #f39c12; color: white; transform: scale(1.05); }

        /* Cricket Grid */
        .grid { width: 100%; border-spacing: 2px; }
        .num-col { font-size: 1.2rem; font-weight: bold; color: #f1c40f; width: 30px; background: #2c3e50; border-radius: 4px; }
        .m-btn { width: 100%; height: 42px; font-size: 1.3rem; background: #1e272e; color: #555; border: 1px solid #333; border-radius: 4px; }
        .m-btn.is-target { border: 1px solid white; color: #fff; background: #2c3e50; }
        .m-btn.closed { background: #27ae60 !important; color: white !important; opacity: 1 !important; }
        
        /* X01 Section */
        #seccion-x01 { padding: 20px 0; }
        input { padding: 15px; font-size: 1.8rem; width: 120px; border-radius: 10px; border: none; background: #2c3e50; color: white; text-align: center; }

        .btn-action { padding: 15px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .f-wide { width: 95%; margin-top: 10px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="nav-btn" onclick="initJ(301)" id="btn301">301</button>
        <button class="nav-btn active" onclick="initJ(501)" id="btn501">501</button>
        <button class="nav-btn" onclick="initJ('C')" id="btnC">CRICKET MASTER</button>
    </div>

    <div class="header-grid">
        <div id="b0" class="p-box active-0"><span>P1</span><span class="score" id="s0">0</span><span class="d-count" id="d0">0/3</span></div>
        <div id="b1" class="p-box"><span>P2</span><span class="score" id="s1">0</span><span class="d-count" id="d1">0/3</span></div>
        <div id="b2" class="p-box"><span>P3</span><span class="score" id="s2">0</span><span class="d-count" id="d2">0/3</span></div>
        <div id="b3" class="p-box"><span>P4</span><span class="score" id="s3">0</span><span class="d-count" id="d3">0/3</span></div>
    </div>

    <div id="mult-container" class="mult-bar" style="display:none;">
        <button class="m-sel active" id="mx1" onclick="setM(1)">SIMPLE</button>
        <button class="m-sel" id="mx2" onclick="setM(2)">DOBLE</button>
        <button class="m-sel" id="mx3" onclick="setM(3)">TRIPLE</button>
    </div>

    <div id="seccion-x01">
        <input type="number" id="inpX" placeholder="0" inputmode="numeric">
        <button class="btn-action f-wide" style="background:#27ae60;" onclick="addX()">ANOTAR DARDO</button>
    </div>

    <div id="seccion-cricket" style="display:none;">
        <table class="grid"><tbody id="c-body"></tbody></table>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button class="btn-action" style="flex:1; background:#c0392b;" onclick="pen(25)">FUERA / BULL (25)</button>
            <button class="btn-action" style="flex:1; background:#444;" onclick="penNum()">OTRO Nº</button>
        </div>
    </div>

    <button class="btn-action f-wide" style="background:#f1c40f; color:black;" onclick="nextT()">PASAR TURNO ➜</button>

    <div style="margin-top:15px; display:flex; justify-content:center; gap:10px;">
        <button onclick="undo()" style="background:#555; border:none; color:white; padding:8px 15px; border-radius:5px;">↩ Deshacer</button>
        <button onclick="reiniciar()" style="background:#7f8c8d; border:none; color:white; padding:8px 15px; border-radius:5px;">Reset</button>
    </div>

    <script>
        let modo = 501, turno = 0, scores = [501,501,501,501], dardos = 0, mult = 1;
        let marks = {20:[0,0,0,0],19:[0,0,0,0],18:[0,0,0,0],17:[0,0,0,0],16:[0,0,0,0],15:[0,0,0,0],25:[0,0,0,0]};
        let orden = [20,19,18,17,16,15,25], hist = [];

        function initJ(m) { 
            modo = m; 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn'+(m==='C'?'C':m)).classList.add('active');
            reiniciar(); 
        }

        function setM(v) { 
            mult = v; 
            document.querySelectorAll('.m-sel').forEach(b => b.classList.remove('active'));
            document.getElementById('mx'+v).classList.add('active');
        }

        function getT() { for(let n of orden) { if(marks[n].some(m => m < 3)) return n; } return 25; }

        function addX() {
            let v = parseInt(document.getElementById('inpX').value);
            if(isNaN(v)) return;
            save();
            if(scores[turno]-v < 0 || scores[turno]-v === 1) { alert("BUST!"); dardos=3; }
            else if(scores[turno]-v === 0) { alert("P"+(turno+1)+" GANA!"); reiniciar(); return; }
            else { scores[turno]-=v; dardos++; }
            document.getElementById('inpX').value = '';
            if(dardos>=3) nextT(); else render();
        }

        function markC(n, p) {
            if(p !== turno || n !== getT()) return;
            if(n === 25 && mult === 3) { alert("No existe Triple Bullseye"); return; }
            save();
            let hits = mult;
            for(let i=0; i<hits; i++) {
                if(marks[n][p] < 3) marks[n][p]++;
                else { for(let j=0; j<4; j++) { if(j!==p && marks[n][j]<3) scores[j]+=(n===25?25:n); } }
            }
            dardos++;
            setM(1);
            if(dardos>=3) nextT(); else { checkW(); render(); }
        }

        function pen(v) { save(); scores[turno]+=v; dardos++; if(dardos>=3) nextT(); else render(); }
        function penNum() { let p = parseInt(prompt("Puntos:")); if(!isNaN(p)) pen(p); }
        function nextT() { dardos=0; turno=(turno+1)%4; setM(1); render(); }

        function render() {
            let t = getT();
            document.getElementById('mult-container').style.display = (modo==='C'?'flex':'none');
            document.getElementById('seccion-x01').style.display = (modo==='C'?'none':'block');
            document.getElementById('seccion-cricket').style.display = (modo==='C'?'block':'none');
            for(let i=0; i<4; i++) {
                document.getElementById('s'+i).innerText = scores[i];
                document.getElementById('b'+i).className = 'p-box' + (turno===i?' active-'+i:'');
                document.getElementById('d'+i).innerText = (turno===i ? "DARDOS: "+dardos+"/3" : "");
            }
            if(modo==='C') {
                let h = "";
                orden.forEach(n => {
                    h += `<tr>`;
                    for(let p=0; p<4; p++) {
                        if(p===2) h += `<td class="num-col">${n==25?'B':n}</td>`;
                        let cls = marks[n][p]>=3?'closed':(n===t && p===turno?'is-target':'');
                        h += `<td><button class="m-btn ${cls}" onclick="markC(${n},${p})">${getSym(marks[n][p])}</button></td>`;
                    }
                    h += `</tr>`;
                });
                document.getElementById('c-body').innerHTML = h;
            }
        }

        function getSym(c) { return c===0?"":(c===1?"/":(c===2?"X":"⊚")); }
        function save() { hist.push(JSON.stringify({s:[...scores], t:turno, m:JSON.parse(JSON.stringify(marks)), d:dardos})); }
        function undo() { if(hist.length>0) { let l=JSON.parse(hist.pop()); scores=l.s; turno=l.t; marks=l.m; dardos=l.d; render(); } }
        function reiniciar() { scores=modo==='C'?[0,0,0,0]:[modo,modo,modo,modo]; marks={20:[0,0,0,0],19:[0,0,0,0],18:[0,0,0,0],17:[0,0,0,0],16:[0,0,0,0],15:[0,0,0,0],25:[0,0,0,0]}; turno=0; dardos=0; setM(1); render(); }
        function checkW() { for(let p=0; p<4; p++) { if(orden.every(n=>marks[n][p]>=3) && scores[p]===Math.min(...scores)) { alert("GANADOR P"+(p+1)); reiniciar(); } } }
        render();
    </script>
</body>
</html>
