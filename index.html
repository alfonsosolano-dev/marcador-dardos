<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Master FIX</title>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; --p3: #2ecc71; --p4: #f1c40f; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 5px; }
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .p-box { background: #1e272e; padding: 10px; border-radius: 10px; border: 3px solid #333; }
        .active-0 { border-color: var(--p1); box-shadow: 0 0 10px var(--p1); }
        .active-1 { border-color: var(--p2); box-shadow: 0 0 10px var(--p2); }
        .active-2 { border-color: var(--p3); box-shadow: 0 0 10px var(--p3); }
        .active-3 { border-color: var(--p4); box-shadow: 0 0 10px var(--p4); }
        .score { font-size: 1.8rem; font-weight: bold; }
        .target-info { background: #f1c40f; color: black; padding: 10px; margin: 10px 0; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .grid { width: 100%; border-collapse: collapse; }
        .m-btn { width: 55px; height: 50px; font-size: 1.5rem; background: #2c3e50; color: white; border: 1px solid #121212; border-radius: 5px; margin: 2px; }
        .m-btn.closed { background: #27ae60 !important; }
        .m-btn.is-target { border: 2px solid white; background: #34495e; }
        .num-col { font-size: 1.4rem; font-weight: bold; color: #f1c40f; width: 40px; }
        .btn-fail { width: 48%; padding: 15px; background: #c0392b; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 1%; }
        .btn-other { width: 48%; padding: 15px; background: #444; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 1%; }
    </style>
</head>
<body>

    <div class="header-grid">
        <div id="b0" class="p-box active-0"><div>P1</div><div class="score" id="s0">0</div></div>
        <div id="b1" class="p-box"><div>P2</div><div class="score" id="s1">0</div></div>
        <div id="b2" class="p-box"><div>P3</div><div class="score" id="s2">0</div></div>
        <div id="b3" class="p-box"><div>P4</div><div class="score" id="s3">0</div></div>
    </div>

    <div class="target-info">OBJETIVO: <span id="current-target">20</span></div>

    <table class="grid"><tbody id="c-body"></tbody></table>

    <div style="margin-top:15px;">
        <button class="btn-other" onclick="falloNumero()">OTRO Nº</button>
        <button class="btn-fail" onclick="falloFuera()">FUERA (+25)</button>
    </div>

    <div style="margin-top:20px; display:flex; justify-content: space-around;">
        <button onclick="undo()" style="padding:10px; background:#555; border:none; color:white; border-radius:5px;">↩ Deshacer</button>
        <button onclick="reiniciar()" style="padding:10px; background:#c0392b; border:none; color:white; border-radius:5px;">Reiniciar</button>
    </div>

    <script>
        let turno = 0;
        let scores = [0, 0, 0, 0];
        let marks = {20:[0,0,0,0], 19:[0,0,0,0], 18:[0,0,0,0], 17:[0,0,0,0], 16:[0,0,0,0], 15:[0,0,0,0], 25:[0,0,0,0]};
        let orden = [20, 19, 18, 17, 16, 15, 25];
        let history = [];

        function getTarget() {
            for(let n of orden) {
                if(marks[n].some(m => m < 3)) return n;
            }
            return 25;
        }

        function markC(n, p) {
            let targetActual = getTarget();
            if(n !== targetActual) {
                alert("Debes tirar al " + (targetActual === 25 ? "Bull" : targetActual));
                return;
            }
            
            save();
            turno = p; // El turno se ajusta a quien pulses
            
            if(marks[n][p] < 3) {
                marks[n][p]++;
            } else {
                // Si ya cerró, suma puntos a los que NO han cerrado
                for(let i=0; i<4; i++) {
                    if(i !== p && marks[n][i] < 3) scores[i] += (n === 25 ? 25 : n);
                }
            }
            verificarVictoria();
            render();
        }

        function falloNumero() {
            let n = prompt("¿A qué número le has dado?");
            let pts = parseInt(n);
            if(!isNaN(pts)) { save(); scores[turno] += pts; render(); }
        }

        function falloFuera() {
            save(); scores[turno] += 25; render();
        }

        function render() {
            let t = getTarget();
            document.getElementById('current-target').innerText = t === 25 ? "BULL" : t;
            
            for(let i=0; i<4; i++) {
                document.getElementById('s'+i).innerText = scores[i];
                document.getElementById('b'+i).className = 'p-box' + (turno===i ? ' active-'+i : '');
            }

            let h = "";
            orden.forEach(n => {
                h += `<tr>`;
                for(let p=0; p<4; p++) {
                    if(p===2) h += `<td class="num-col">${n==25?'B':n}</td>`;
                    let status = marks[n][p] >= 3 ? 'closed' : (n === t ? 'is-target' : '');
                    h += `<td><button class="m-btn ${status}" onclick="markC(${n},${p})">${getS(marks[n][p])}</button></td>`;
                }
                h += `</tr>`;
            });
            document.getElementById('c-body').innerHTML = h;
        }

        function getS(c) { return c===0 ? "" : (c===1 ? "/" : (c===2 ? "X" : "⊚")); }
        function save() { history.push({s:[...scores], t:turno, m:JSON.parse(JSON.stringify(marks))}); }
        function undo() { if(history.length>0) { let l=history.pop(); scores=l.s; turno=l.t; marks=l.m; render(); } }
        function reiniciar() { if(confirm("¿Reiniciar?")) location.reload(); }
        function verificarVictoria() {
            for(let p=0; p<4; p++) {
                if(orden.every(n => marks[n][p] >= 3)) {
                    let min = Math.min(...scores);
                    if(scores[p] === min) { alert("¡GANADOR P" + (p+1) + "!"); location.reload(); }
                }
            }
        }
        render();
    </script>
</body>
</html>
